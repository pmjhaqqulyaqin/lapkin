<!doctype html>
<html lang="id" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-man2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Platform Laporan Kinerja Digital untuk mengelola aktivitas harian, jadwal mengajar, dan mencetak laporan kinerja bulanan secara otomatis.">
    <title>Laporan Kinerja Digital (LKD)</title>

    <!-- Preconnect agar Google Fonts dimuat lebih cepat -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet"/>

    <!-- Critical inline CSS — mencegah FOUC (Flash of Unstyled Content) -->
    <style>
      /* Warna dasar agar body tidak pernah terlihat putih polos dengan kode-kode */
      html { background: #f8fafc; }
      html.dark { background: #0f172a; }
      body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

      /* Sembunyikan ikon Material Symbols sampai font dimuat (cegah FOUT) */
      .material-symbols-outlined {
        opacity: 0;
        transition: opacity 0.15s ease-out;
      }
      html.icons-ready .material-symbols-outlined {
        opacity: 1;
      }

      /* Loading spinner */
      #app-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        flex-direction: column;
        gap: 16px;
      }
      #app-loader .spinner {
        width: 36px; height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #0d9488;
        border-radius: 50%;
        animation: lkd-spin 0.7s linear infinite;
      }
      html.dark #app-loader .spinner {
        border-color: #334155;
        border-top-color: #2dd4bf;
      }
      #app-loader .label {
        font-weight: 700; font-size: 13px; letter-spacing: 0.05em;
        color: #0f766e; text-transform: uppercase;
      }
      html.dark #app-loader .label { color: #5eead4; }
      @keyframes lkd-spin { to { transform: rotate(360deg); } }

      /* Sembunyikan loader setelah React mount */
      #root:not(:empty) #app-loader { display: none !important; }
    </style>

    <!-- Deteksi font icon loaded, tampilkan icon -->
    <script>
      (function(){
        var show = function(){ document.documentElement.classList.add('icons-ready'); };
        if (document.fonts) {
          document.fonts.load('24px "Material Symbols Outlined"').then(show);
        }
        setTimeout(show, 4000); // Safety: tampilkan setelah 4 detik walau gagal
      })();
    </script>
  </head>
  <body class="bg-surface font-body text-on-surface antialiased">
    <div id="root">
      <!-- Inline loading skeleton — mencegah flash kode/konten mentah saat refresh -->
      <div id="app-loader">
        <div class="spinner"></div>
        <div class="label">Memuat LKD...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
