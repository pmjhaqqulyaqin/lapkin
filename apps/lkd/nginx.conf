server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse Proxy — Teruskan semua request /api/* ke Backend API container
    # Ini menyelesaikan masalah "Unexpected token '<'" karena tanpa ini,
    # request /api/* akan jatuh ke fallback index.html (HTML, bukan JSON).
    location /api/ {
        proxy_pass http://lapkin-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tingkatkan batas ukuran body untuk sinkronisasi data besar (avatar base64, dll)
        client_max_body_size 10m;
    }

    # Konfigurasi ini penting agar React Router (Single Page Application) tidak memunculkan Error 404 saat direfresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Konfigurasi caching statis untuk mempercepat PWA
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webmanifest)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
