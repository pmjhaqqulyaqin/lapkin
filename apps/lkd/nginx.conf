server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Konfigurasi ini penting agar React Router (Single Page Application) tidak memunculkan Error 404 saat direfresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Konfigurasi caching statis untuk mempercepat PWA
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webmanifest)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
