version: '3.8'

services:
  # Frontend PWA (Static files served by Nginx)
  lapkin-lkd:
    build:
      context: .
      dockerfile: apps/lkd/Dockerfile
    container_name: lapkin-lkd-app
    restart: unless-stopped
    ports:
      # Format: "PORT_LUAR_VPS:PORT_DALAM_CONTAINER"
      # Kita gunakan port 18080 agar unik dan tidak bertabrakan dengan mandaapp
      - "18080:80"

  # Backend Sync API (Express.js)
  lapkin-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lapkin-api
    restart: unless-stopped
    ports:
      - "18081:3000"
    environment:
      - DATABASE_URL=postgresql://lkd_user:${LKD_DB_PASSWORD:-lkd_secure_password_2026}@lapkin-db:5432/lkd_db
      - JWT_SECRET=${LKD_JWT_SECRET:-lkd-jwt-secret-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      lapkin-db:
        condition: service_healthy

  # PostgreSQL Database
  lapkin-db:
    image: postgres:16-alpine
    container_name: lapkin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lkd_db
      POSTGRES_USER: lkd_user
      POSTGRES_PASSWORD: ${LKD_DB_PASSWORD:-lkd_secure_password_2026}
    volumes:
      - lkd_pgdata:/var/lib/postgresql/data
      # Auto-run migration SQL saat pertama kali container dibuat
      - ./apps/api/src/migrations:/docker-entrypoint-initdb.d
    ports:
      # Port unik agar tidak bertabrakan dengan PostgreSQL mandaapp
      - "18432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lkd_user -d lkd_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lkd_pgdata:
    name: lapkin_lkd_pgdata
